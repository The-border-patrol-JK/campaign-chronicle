<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Campaign Chronicle</title>

<link rel="stylesheet" href="styles.css">
<link rel="icon" href="data:,">

</head>

<body>

<!-- LOGIN SCREEN -->

<div id="authSection">

<h1>Campaign Chronicle</h1>

<input id="email" placeholder="Email">
<br><br>

<input id="password" type="password" placeholder="Password">
<br><br>

<button id="registerBtn">Register</button>
<button id="loginBtn">Login</button>

<hr>

<input id="joinCodeInput" placeholder="Join Code">
<button id="joinBtn">Join Campaign</button>

</div>


<!-- MAIN APP -->

<div id="appLayout" class="hidden">

<header>

<h1>Campaign Chronicle</h1>

<button id="notesPageBtn">Notes</button>
<button id="mapsPageBtn">Maps</button>

</header>


<div class="layout">

<div class="sidebar">

<h2>Your Campaigns</h2>

<button id="newCampaignBtn">Create Campaign</button>

<div id="campaignList"></div>

</div>


<div class="content">

<h2 id="campaignTitle">Open a campaign</h2>


<!-- NOTES -->

<div id="notesPage">

<h3>Session Notes</h3>

<textarea id="noteText"></textarea>

<h3>Private Notes</h3>

<textarea id="privateNotes"></textarea>

</div>


<!-- MAP BOARD -->

<div id="mapsPage" class="hidden">

<h2>Map Board</h2>

<div class="mapControls">

<button id="addMapBtn">Add Map</button>
<button id="tokenBtn">Add Token</button>
<button id="fogBtn">Fog of War</button>
<button id="markerBtn">Add Marker</button>

</div>

<input type="file" id="mapUpload" hidden>

<div id="mapBoard"></div>

</div>

</div>

</div>

</div>

<script type="module" src="main.js"></script>

</body>
</html>
