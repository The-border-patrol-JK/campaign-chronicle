<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Campaign Chronicle</title>

<link rel="stylesheet" href="styles.css">
<link rel="icon" href="data:,">

</head>

<body>

<div id="authSection">

<h1>Campaign Chronicle</h1>

<input id="email" placeholder="Email">
<br><br>

<input id="password" type="password" placeholder="Password">
<br><br>

<button id="registerBtn">Register</button>
<button id="loginBtn">Login</button>

<hr>

<input id="joinCodeInput" placeholder="Join Code">
<button id="joinBtn">Join Campaign</button>

</div>


<div id="appLayout" class="hidden">

<header>

<h1>Campaign Chronicle</h1>

<button id="notesPageBtn">Notes</button>
<button id="mapsPageBtn">Maps</button>

</header>


<div class="layout">

<div class="sidebar">

<h2>Your Campaigns</h2>

<button id="newCampaignBtn">Create Campaign</button>

<div id="campaignList"></div>

</div>


<div class="content">

<h2 id="campaignTitle">Map Board</h2>


<div id="mapsPage">

<div class="mapControls">

<button id="addMapBtn">Add Map</button>
<button id="tokenBtn">Add Token</button>
<button id="fogBtn">Fog</button>
<button id="drawBtn">Draw</button>
<button id="measureBtn">Measure</button>

<button id="uploadMarkerBtn">Upload Marker</button>

</div>

<input type="file" id="mapUpload" hidden>
<input type="file" id="markerUpload" hidden>

<div id="mapBoard">

<canvas id="gridCanvas"></canvas>
<canvas id="drawCanvas"></canvas>

</div>

</div>

</div>

</div>

</div>

<script type="module" src="main.js"></script>

</body>
</html>
